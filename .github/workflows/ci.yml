name: ci

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # Provision pnpm the same way the release workflow does (action-setup,
      # pinned to v9) — corepack floats to a stricter pnpm that treats
      # ERR_PNPM_IGNORED_BUILDS (esbuild's gated postinstall) as a fatal
      # install error. One pnpm provisioning method across both workflows.
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "pnpm"
      - run: pnpm install
      - run: pnpm build
      - run: pnpm test
      - run: pnpm typecheck
